name = "demo_scenarios"
output_dir = "results"
seed = 21
episodes = 6
hops = 3

[environment]
name = "sensor_fusion"
num_agents = 6
num_objects = 14
visibility_prob = 0.35

[communication]
topology = "ring"
compressor = "novelty_topk"
message_budget = 3
message_dropout_prob = 0.0

[sweep]
topologies = ["chain", "ring", "star", "fully_connected"]
compressors = ["full_state", "novelty_topk", "degree_aware_novelty"]
message_budgets = [2, 3]
visibility_probs = [0.25, 0.35]
message_dropout_probs = [0.0, 0.1]
