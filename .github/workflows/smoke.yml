name: smoke

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package and test tools
        run: python -m pip install -e . pytest

      - name: Run unit tests
        run: python -m pytest tests -q

      - name: Run smoke experiment
        run: python scripts/run_smoke.py

      - name: Run demo suite
        run: python scripts/run_demo_suite.py

      - name: Export markdown report
        run: python scripts/export_markdown_report.py

      - name: Generate dashboard
        run: python scripts/generate_dashboard.py
